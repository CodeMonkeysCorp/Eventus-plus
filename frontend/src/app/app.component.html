<div class="app-shell">
  <header class="topbar card-panel">
    <div class="topbar-inner">
      <a class="brand" routerLink="/home">
        <span class="brand-mark">Eventus+</span>
        <small>Gestão de eventos</small>
      </a>

      <nav class="topbar-links">
        <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Início</a>
        <a routerLink="/eventos" routerLinkActive="active">Eventos</a>
        <a *ngIf="isParticipant" routerLink="/minhas-inscricoes" routerLinkActive="active">Minhas inscrições</a>
        <a *ngIf="isParticipant" routerLink="/certificados" routerLinkActive="active">Certificados</a>
        <a *ngIf="isStaff" class="staff-link" routerLink="/painel" routerLinkActive="active">Painel</a>
      </nav>

      <div class="topbar-user" *ngIf="(user$ | async) as user; else guestActions">
        <div class="user-summary">
          <strong>{{ firstName(user.fullName) }}</strong>
          <span>{{ roleLabel(user.role) }}</span>
        </div>
        <button type="button" class="btn btn-sm btn-outline-secondary" (click)="logout()">Sair</button>
      </div>

      <ng-template #guestActions>
        <div class="topbar-user">
          <a routerLink="/login" class="btn btn-sm btn-outline-secondary">Entrar</a>
          <a routerLink="/register" class="btn btn-sm btn-aurora">Criar conta</a>
        </div>
      </ng-template>
    </div>
  </header>

  <main class="main-wrap">
    <div class="container-shell">
      <router-outlet></router-outlet>
    </div>
  </main>

  <footer class="footer-note">Eventus+ {{ currentYear }}</footer>
</div>
