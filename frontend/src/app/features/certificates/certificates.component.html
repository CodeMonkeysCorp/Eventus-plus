<section class="section-stack">
  <div class="hero-panel card-panel">
    <h1 class="hero-title">Certificados</h1>
    <p class="hero-subtitle">Emissões liberadas após check-in.</p>
  </div>

  <div *ngIf="errorMessage" class="feedback-error">{{ errorMessage }}</div>
  <div *ngIf="loading" class="loading-copy">Carregando certificados...</div>

  <div *ngIf="!loading && certificates.length === 0" class="empty-state">
    Nenhum certificado foi liberado ainda.
  </div>

  <div *ngIf="!loading && certificates.length > 0" class="certificate-grid">
    <article class="card-panel certificate-card" *ngFor="let certificate of certificates; trackBy: trackByCertificateId">
      <h2>{{ certificate.eventTitle }}</h2>
      <p>Certificado disponível.</p>
      <strong>{{ formatDateTime(certificate.issuedAt) }}</strong>
    </article>
  </div>
</section>
