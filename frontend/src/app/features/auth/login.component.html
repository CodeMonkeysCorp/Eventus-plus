<section class="auth-layout">
  <div class="auth-card auth-card-compact card-panel">
    <div class="auth-card-header">
      <h1>Entrar</h1>
      <p class="auth-copy">Use email e senha.</p>
    </div>

    <div *ngIf="errorMessage" class="feedback-error">{{ errorMessage }}</div>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="field-group">
        <label class="form-label" for="email">Email</label>
        <input
          id="email"
          class="form-control"
          [class.is-invalid]="fieldInvalid('email')"
          type="email"
          inputmode="email"
          autocomplete="email"
          formControlName="email"
          placeholder="voce@email.com">
        <small *ngIf="fieldInvalid('email')" class="field-error">{{ fieldError('email') }}</small>
      </div>

      <div class="field-group">
        <div class="field-label-row">
          <label class="form-label" for="password">Senha</label>
        </div>
        <div class="password-field">
          <input
            id="password"
            class="form-control"
            [class.is-invalid]="fieldInvalid('password')"
            [type]="showPassword ? 'text' : 'password'"
            autocomplete="current-password"
            formControlName="password"
            placeholder="Digite sua senha">
          <button type="button" class="btn btn-outline-secondary toggle-button" (click)="togglePassword()">
            {{ showPassword ? 'Ocultar' : 'Mostrar' }}
          </button>
        </div>
        <small *ngIf="fieldInvalid('password')" class="field-error">{{ fieldError('password') }}</small>
      </div>

      <button class="btn btn-aurora w-100 auth-submit" type="submit" [disabled]="loading">
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <p class="auth-footnote">
      Novo aqui?
      <a routerLink="/register">Criar conta</a>
    </p>
  </div>
</section>
