<section class="auth-layout">
  <div class="auth-card auth-card-wide card-panel">
    <div class="auth-card-header">
      <h1>Criar conta</h1>
      <p class="auth-copy">Acesse agenda, inscrições e certificados.</p>
    </div>

    <div *ngIf="errorMessage" class="feedback-error">{{ errorMessage }}</div>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="field-grid">
        <div class="field-group">
          <label class="form-label" for="fullName">Nome completo</label>
          <input
            id="fullName"
            class="form-control"
            [class.is-invalid]="fieldInvalid('fullName')"
            type="text"
            autocomplete="name"
            formControlName="fullName"
            placeholder="Seu nome completo">
          <small *ngIf="fieldInvalid('fullName')" class="field-error">{{ fieldError('fullName') }}</small>
        </div>

        <div class="field-group">
          <label class="form-label" for="email">Email</label>
          <input
            id="email"
            class="form-control"
            [class.is-invalid]="fieldInvalid('email')"
            type="email"
            inputmode="email"
            autocomplete="email"
            formControlName="email"
            placeholder="voce@email.com">
          <small *ngIf="fieldInvalid('email')" class="field-error">{{ fieldError('email') }}</small>
        </div>
      </div>

      <div class="field-grid">
        <div class="field-group">
          <label class="form-label" for="password">Senha</label>
          <div class="password-field">
            <input
              id="password"
              class="form-control"
              [class.is-invalid]="fieldInvalid('password')"
              [type]="showPassword ? 'text' : 'password'"
              autocomplete="new-password"
              formControlName="password"
              placeholder="8 a 72 caracteres">
            <button type="button" class="btn btn-outline-secondary toggle-button" (click)="togglePassword()">
              {{ showPassword ? 'Ocultar' : 'Mostrar' }}
            </button>
          </div>
          <small class="field-hint">Use entre 8 e 72 caracteres.</small>
          <small *ngIf="fieldInvalid('password')" class="field-error">{{ fieldError('password') }}</small>
        </div>

        <div class="field-group">
          <label class="form-label" for="confirmPassword">Confirmar senha</label>
          <div class="password-field">
            <input
              id="confirmPassword"
              class="form-control"
              [class.is-invalid]="fieldInvalid('confirmPassword')"
              [type]="showConfirmPassword ? 'text' : 'password'"
              autocomplete="new-password"
              formControlName="confirmPassword"
              placeholder="Repita a senha">
            <button type="button" class="btn btn-outline-secondary toggle-button" (click)="toggleConfirmPassword()">
              {{ showConfirmPassword ? 'Ocultar' : 'Mostrar' }}
            </button>
          </div>
          <small *ngIf="fieldInvalid('confirmPassword')" class="field-error">{{ fieldError('confirmPassword') }}</small>
        </div>
      </div>

      <button class="btn btn-aurora w-100 auth-submit" type="submit" [disabled]="loading">
        {{ loading ? 'Criando conta...' : 'Criar conta' }}
      </button>
    </form>

    <p class="auth-footnote">
      Já tem conta?
      <a routerLink="/login">Entrar</a>
    </p>
  </div>
</section>
