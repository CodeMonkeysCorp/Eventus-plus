services:
  mysql:
    image: mysql:8.4
    container_name: eventus-plus-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE obrigatorio}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER obrigatorio}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD obrigatorio}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD obrigatorio}
      MYSQL_ROOT_HOST: "%"
      TZ: America/Sao_Paulo
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE obrigatorio}
    container_name: eventus-plus-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL obrigatorio}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD obrigatorio}
      OPERATOR_NAME: ${OPERATOR_NAME:-}
      OPERATOR_EMAIL: ${OPERATOR_EMAIL:-}
      OPERATOR_PASSWORD: ${OPERATOR_PASSWORD:-}
      PARTICIPANT_NAME: ${PARTICIPANT_NAME:-}
      PARTICIPANT_EMAIL: ${PARTICIPANT_EMAIL:-}
      PARTICIPANT_PASSWORD: ${PARTICIPANT_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET obrigatorio}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    expose:
      - "8080"

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE obrigatorio}
    container_name: eventus-plus-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  mysql_data:
