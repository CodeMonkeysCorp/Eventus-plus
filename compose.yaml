services:
  mysql:
    image: mysql:8.4
    container_name: eventus-plus-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-eventus_plus}
      MYSQL_USER: ${MYSQL_USER:-eventus_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-eventus123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_ROOT_HOST: "%"
      TZ: America/Sao_Paulo
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    image: eventus-plus-backend:local
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventus-plus-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-eventus_plus}
      DB_USER: ${MYSQL_USER:-eventus_app}
      DB_PASSWORD: ${MYSQL_PASSWORD:-eventus123}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador Local}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@eventusplus.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change_me_admin}
      JWT_SECRET: ${JWT_SECRET:-replace_with_a_strong_secret_with_32_chars_or_more}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4201}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${BACKEND_PORT:-8081}:8080"

  frontend:
    image: eventus-plus-frontend:local
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eventus-plus-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-4201}:80"

volumes:
  mysql_data:
